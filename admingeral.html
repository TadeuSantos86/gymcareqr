<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Geral | ConetFacility</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#f3f4f6;color:#111827}.oculto{display:none!important}
input,select,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:10px}textarea{min-height:90px}
button{border:0;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer}.btn-verde{background:#93D500;color:#111827}.btn-cinza{background:#e5e7eb}.btn-azul{background:#3B82F6;color:white}.btn-vermelho{background:#ef4444;color:white}
.erro{color:#dc2626;font-weight:bold}.sucesso{color:#15803d;font-weight:bold}.card,.bloco{background:white;padding:25px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08);margin-bottom:20px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}.login-card{max-width:620px;width:100%;background:white;border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,.08);padding:42px}.logo-login{text-align:center;margin-bottom:22px}.logo-login img{width:220px;max-width:82%;border-radius:18px;box-shadow:0 8px 22px rgba(0,0,0,.12)}
header{background:#323E48;color:white;padding:20px 35px;display:flex;align-items:center;justify-content:space-between}header img{max-width:180px;max-height:80px;object-fit:contain}.container{padding:30px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:25px 0}.numero{font-size:34px;font-weight:bold;color:#93D500}.item{border-bottom:1px solid #e5e7eb;padding:15px 0}.botoes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.logo-preview{max-width:160px;max-height:70px;object-fit:contain}
@media(max-width:900px){.grid{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}}
</style></head><body>
<div id="telaLogin" class="login"><div class="login-card"><div class="logo-login"><img src="./logo_conetfacility.png" onerror="this.style.display='none'"></div><h1>ConetFacility</h1><p>Admin Geral</p><label>Usuário</label><input id="usuario" placeholder="Digite seu usuário"><label>Senha</label><input id="senha" type="password" placeholder="Digite sua senha"><button class="btn-verde" onclick="entrarMaster()">Entrar</button><p id="erroLogin" class="erro"></p></div></div>
<div id="telaAdmin" class="oculto"><header><img src="./logo_conetfacility.png" onerror="this.style.display='none'"><button class="btn-cinza" onclick="sair()">Sair</button></header><div class="container">
<h1>Dashboard Geral de Clientes</h1><p>Gerenciamento comercial, operacional e técnico.</p>
<div class="cards"><div class="card"><h3>Clientes</h3><div id="mClientes" class="numero">0</div></div><div class="card"><h3>Ativos</h3><div id="mAtivos" class="numero">0</div></div><div class="card"><h3>Equipamentos</h3><div id="mEquipamentos" class="numero">0</div></div><div class="card"><h3>Chamados abertos</h3><div id="mChamados" class="numero">0</div></div></div>
<div class="grid"><div class="bloco"><h2>Clientes / academias</h2><input id="buscaCliente" placeholder="buscar" oninput="renderizarAcademias()"><div id="listaAcademias"></div></div><div class="bloco"><h2>Métricas por cliente</h2><div id="metricasClientes"></div></div></div>
<div class="bloco"><h2>Criar / Editar Cliente</h2><input type="hidden" id="academiaId"><div class="form-grid"><div><label>Nome</label><input id="nomeAcademia"></div><div><label>E-mail(s)</label><input id="emailsAcademia"></div><div><label>Logo URL</label><input id="logoAcademia"></div><div><label>Cor</label><input id="corAcademia" value="#93D500"></div><div><label>Status</label><select id="statusAcademia"><option value="ATIVO">ATIVO</option><option value="INATIVO">INATIVO</option></select></div></div><button class="btn-verde" onclick="salvarAcademia()">Salvar Cliente</button><button class="btn-cinza" onclick="limparCliente()">Limpar</button><p id="erroCliente" class="erro"></p><p id="msgCliente" class="sucesso"></p></div>
<div class="bloco"><h2>Usuários do Painel Admin do Cliente</h2><div class="form-grid"><div><label>Cliente</label><select id="selectClienteUsuarioPainel" onchange="carregarUsuariosPainelClienteSelecionado()"></select></div><div><label>Nome</label><input id="nomeUsuarioPainelCliente"></div><div><label>Usuário</label><input id="loginUsuarioPainelCliente"></div><div><label>Senha</label><input id="senhaUsuarioPainelCliente"></div><div><label>Status</label><select id="statusUsuarioPainelCliente"><option>ATIVO</option><option>INATIVO</option></select></div></div><input type="hidden" id="idUsuarioPainelClienteEditando"><button class="btn-verde" onclick="salvarUsuarioPainelClienteAdminGeral()">Salvar Usuário</button><button class="btn-cinza" onclick="limparFormularioUsuarioPainelCliente()">Limpar</button><p id="erroUsuarioPainelCliente" class="erro"></p><div id="listaUsuariosPainelClienteAdminGeral"></div></div>
</div></div>
<script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co", SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA", DOMINIO="https://sistema.conetfacility.com.br";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);let academias=[],equipamentos=[],chamados=[];
function entrarMaster(){let u=usuario.value.trim(),s=senha.value.trim();erroLogin.innerText="";if(u==="master"&&s==="conet2506"){telaLogin.classList.add("oculto");telaAdmin.classList.remove("oculto");carregarDados();}else erroLogin.innerText="Usuário ou senha inválidos.";}
function sair(){telaAdmin.classList.add("oculto");telaLogin.classList.remove("oculto");usuario.value="";senha.value="";}
function ativo(a){return !["INATIVO","EXCLUIDO","EXCLUÍDO","CANCELADO"].includes(String(a.status_cliente||a.status||"ATIVO").toUpperCase())}
async function carregarDados(){let [a,e,c]=await Promise.all([supabaseClient.from("academias").select("*").order("id"),supabaseClient.from("equipamentos").select("*").order("id"),supabaseClient.from("chamados").select("*").order("id",{ascending:false})]);if(a.error){alert("Supabase: "+a.error.message);return}academias=a.data||[];equipamentos=e.data||[];chamados=c.data||[];renderizarResumo();renderizarAcademias();renderizarMetricasClientes();atualizarSelectUsuariosPainelCliente();}
function renderizarResumo(){mClientes.innerText=academias.length;mAtivos.innerText=academias.filter(ativo).length;mEquipamentos.innerText=equipamentos.length;mChamados.innerText=chamados.filter(c=>String(c.status||"").toUpperCase()==="ABERTO").length;}
function renderizarAcademias(){let b=(buscaCliente.value||"").toLowerCase();let arr=academias.filter(a=>JSON.stringify(a).toLowerCase().includes(b));listaAcademias.innerHTML=arr.map(a=>`<div class="item">${a.logo_url?`<img class="logo-preview" src="${a.logo_url}">`:""}<h3>${a.nome}</h3><p>ID: ${a.id}</p><p>Status: ${a.status_cliente||a.status||"ATIVO"}</p><div class="botoes"><button class="btn-azul" onclick="editarAcademia(${a.id})">Editar</button><button class="btn-cinza" onclick="window.open('${DOMINIO}/?academia_id=${a.id}','_blank')">Abrir Painel</button></div></div>`).join("")||"<p>Nenhum cliente.</p>";}
function renderizarMetricasClientes(){metricasClientes.innerHTML=academias.map(a=>{let eq=equipamentos.filter(e=>Number(e.academia_id)===Number(a.id));let ids=eq.map(e=>Number(e.id));let ch=chamados.filter(c=>ids.includes(Number(c.equipamento_id)));return `<div class="item"><h3>${a.nome}</h3><p>Equipamentos: ${eq.length}</p><p>Chamados: ${ch.length}</p><p>Abertos: ${ch.filter(x=>String(x.status||"").toUpperCase()==="ABERTO").length}</p></div>`}).join("")||"<p>Sem métricas.</p>";}
function limparCliente(){["academiaId","nomeAcademia","emailsAcademia","logoAcademia"].forEach(id=>document.getElementById(id).value="");corAcademia.value="#93D500";statusAcademia.value="ATIVO";}
function editarAcademia(id){let a=academias.find(x=>Number(x.id)===Number(id));if(!a)return;academiaId.value=a.id;nomeAcademia.value=a.nome||"";emailsAcademia.value=a.emails||a.email||"";logoAcademia.value=a.logo_url||"";corAcademia.value=a.cor_principal||"#93D500";statusAcademia.value=a.status_cliente||a.status||"ATIVO";}
async function salvarAcademia(){let id=academiaId.value;let payload={nome:nomeAcademia.value.trim(),emails:emailsAcademia.value.trim(),logo_url:logoAcademia.value.trim(),cor_principal:corAcademia.value.trim(),status_cliente:statusAcademia.value,status:statusAcademia.value};let r=id?await supabaseClient.from("academias").update(payload).eq("id",id):await supabaseClient.from("academias").insert([payload]);if(r.error)erroCliente.innerText=r.error.message;else{msgCliente.innerText="Salvo.";limparCliente();carregarDados();}}
function atualizarSelectUsuariosPainelCliente(){selectClienteUsuarioPainel.innerHTML='<option value="">Selecione um cliente</option>';academias.filter(ativo).forEach(a=>selectClienteUsuarioPainel.innerHTML+=`<option value="${a.id}">${a.nome} — ID ${a.id}</option>`);}
function limparFormularioUsuarioPainelCliente(){["idUsuarioPainelClienteEditando","nomeUsuarioPainelCliente","loginUsuarioPainelCliente","senhaUsuarioPainelCliente"].forEach(id=>document.getElementById(id).value="");statusUsuarioPainelCliente.value="ATIVO";}
async function carregarUsuariosPainelClienteSelecionado(){let id=Number(selectClienteUsuarioPainel.value);if(!id){listaUsuariosPainelClienteAdminGeral.innerHTML="<p>Selecione um cliente.</p>";return}let r=await supabaseClient.from("usuarios_painel_cliente").select("*").eq("academia_id",id).order("id");if(r.error){listaUsuariosPainelClienteAdminGeral.innerHTML=r.error.message;return}listaUsuariosPainelClienteAdminGeral.innerHTML=(r.data||[]).map(u=>`<div class="item"><h3>${u.nome}</h3><p>Usuário: ${u.usuario}</p><p>Status: ${u.status}</p><button class="btn-azul" onclick="editarUsuario(${u.id})">Editar</button> <button class="btn-vermelho" onclick="excluirUsuario(${u.id})">Excluir</button></div>`).join("")||"<p>Nenhum usuário.</p>";}
async function salvarUsuarioPainelClienteAdminGeral(){let id=idUsuarioPainelClienteEditando.value;let p={academia_id:Number(selectClienteUsuarioPainel.value),nome:nomeUsuarioPainelCliente.value.trim(),usuario:loginUsuarioPainelCliente.value.trim(),senha:senhaUsuarioPainelCliente.value.trim(),status:statusUsuarioPainelCliente.value};if(!p.academia_id||!p.nome||!p.usuario||!p.senha){erroUsuarioPainelCliente.innerText="Preencha todos os campos.";return}let r=id?await supabaseClient.from("usuarios_painel_cliente").update(p).eq("id",id):await supabaseClient.from("usuarios_painel_cliente").insert([p]);if(r.error)erroUsuarioPainelCliente.innerText=r.error.message;else{limparFormularioUsuarioPainelCliente();carregarUsuariosPainelClienteSelecionado();}}
async function editarUsuario(id){let r=await supabaseClient.from("usuarios_painel_cliente").select("*").eq("id",id).maybeSingle();let u=r.data;if(!u)return;idUsuarioPainelClienteEditando.value=u.id;selectClienteUsuarioPainel.value=u.academia_id;nomeUsuarioPainelCliente.value=u.nome||"";loginUsuarioPainelCliente.value=u.usuario||"";senhaUsuarioPainelCliente.value=u.senha||"";statusUsuarioPainelCliente.value=u.status||"ATIVO";}
async function excluirUsuario(id){if(confirm("Excluir usuário?")){await supabaseClient.from("usuarios_painel_cliente").delete().eq("id",id);carregarUsuariosPainelClienteSelecionado();}}
</script></body></html>
