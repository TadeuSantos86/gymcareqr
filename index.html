<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move Academia | GymCare QR</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#F3F4F6}
header{background:#323E48;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;color:white}
.logo-area h1{color:#93D500;font-size:34px}
.container{padding:40px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;margin:25px 0}
.card,.equipamentos{background:white;padding:25px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.numero{font-size:38px;font-weight:bold;color:#93D500}
.equipamento{border-bottom:1px solid #ddd;padding:18px 0}
.status{display:inline-block;background:#22c55e;color:white;padding:6px 12px;border-radius:20px;font-size:13px;margin-top:10px}
.erro{color:red;margin-top:20px}
</style>
</head>

<body>

<header>
  <div class="logo-area">
    <h1 id="nomeAcademia">GymCare QR</h1>
    <p id="slogan">Gestão inteligente de equipamentos</p>
  </div>
  <div>
    <p id="endereco"></p>
    <p id="horario"></p>
  </div>
</header>

<div class="container">
  <h2>Dashboard Operacional</h2>
  <p>Dados carregados automaticamente do Supabase</p>

  <div class="cards">
    <div class="card"><h3>Equipamentos</h3><div class="numero" id="totalEquipamentos">0</div></div>
    <div class="card"><h3>Chamados abertos</h3><div class="numero" id="chamadosAbertos">0</div></div>
    <div class="card"><h3>Em manutenção</h3><div class="numero" id="emManutencao">0</div></div>
    <div class="card"><h3>Revisões pendentes</h3><div class="numero" id="revisoesPendentes">0</div></div>
  </div>

  <div class="equipamentos">
    <h2>Equipamentos Monitorados</h2>
    <div id="listaEquipamentos">Carregando...</div>
  </div>

  <p class="erro" id="erro"></p>
</div>

<script>
const SUPABASE_URL = "https://juwbkfhfmygduktuzqmu.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function carregarDashboard(){
  try{
    const { data: academia } = await supabaseClient
      .from("academias")
      .select("*")
      .eq("id", 1)
      .single();

    if(academia){
      document.getElementById("nomeAcademia").innerText = academia.nome || "GymCare QR";
      document.getElementById("slogan").innerText = academia.slogan || "Gestão inteligente de equipamentos";
      document.getElementById("endereco").innerText = academia.endereco || "";
      document.getElementById("horario").innerText = academia.horario_funcionamento || "";
      document.documentElement.style.setProperty("--corPrimaria", academia.cor_primaria || "#93D500");
    }

    const { data: equipamentos, error: erroEq } = await supabaseClient
      .from("equipamentos")
      .select("*")
      .eq("academia_id", 1);

    if(erroEq) throw erroEq;

    const { data: chamados, error: erroChamados } = await supabaseClient
      .from("chamados")
      .select("*");

    if(erroChamados) throw erroChamados;

    const totalEquipamentos = equipamentos.length;
    const chamadosAbertos = chamados.filter(c => c.status === "ABERTO").length;
    const emManutencao = equipamentos.filter(e => e.status === "MANUTENCAO").length;

    document.getElementById("totalEquipamentos").innerText = totalEquipamentos;
    document.getElementById("chamadosAbertos").innerText = chamadosAbertos;
    document.getElementById("emManutencao").innerText = emManutencao;
    document.getElementById("revisoesPendentes").innerText = 0;

    const lista = document.getElementById("listaEquipamentos");
    lista.innerHTML = "";

    equipamentos.forEach(eq => {
      const div = document.createElement("div");
      div.className = "equipamento";
      div.innerHTML = `
        <h3>${eq.nome}</h3>
        <p><strong>Marca:</strong> ${eq.marca || "-"}</p>
        <p><strong>Modelo:</strong> ${eq.modelo || "-"}</p>
        <p><strong>Localização:</strong> ${eq.localizacao || "-"}</p>
        <p><strong>Última revisão:</strong> ${eq.ultima_revisao || "-"}</p>
        <p><strong>Próxima revisão:</strong> ${eq.proxima_revisao || "-"}</p>
        <div class="status">${eq.status}</div>
      `;
      lista.appendChild(div);
    });

  }catch(error){
    document.getElementById("erro").innerText = "Erro ao carregar dados: " + error.message;
  }
}

carregarDashboard();
</script>

</body>
</html>
