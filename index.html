<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ConetFacility - Admin Cliente</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#f3f4f6;color:#111827}.oculto{display:none!important}
input,select,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:10px}textarea{min-height:90px}
button{border:0;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer}.btn-verde{background:#93D500;color:#111827}.btn-cinza{background:#e5e7eb}.btn-azul{background:#3B82F6;color:white}.btn-vermelho{background:#ef4444;color:white}
.erro{color:#dc2626;font-weight:bold}.sucesso{color:#15803d;font-weight:bold}.card,.bloco{background:white;padding:25px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08);margin-bottom:20px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}.login-card{max-width:620px;width:100%;background:white;border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,.08);padding:42px}.logo-login{text-align:center;margin-bottom:22px}.logo-login img{width:220px;max-width:82%;border-radius:18px;box-shadow:0 8px 22px rgba(0,0,0,.12)}
header{background:#323E48;color:white;padding:20px 35px;display:flex;align-items:center;justify-content:space-between}header img{max-width:180px;max-height:80px;object-fit:contain}.container{padding:30px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:25px 0}.numero{font-size:34px;font-weight:bold;color:#93D500}.item{border-bottom:1px solid #e5e7eb;padding:15px 0}.botoes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.logo-preview{max-width:160px;max-height:70px;object-fit:contain}
@media(max-width:900px){.grid{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}}
</style></head><body><div id="loginArea" class="login"><div class="login-card"><div id="logoLoginCliente"></div><h1 id="tituloLogin">ConetFacility</h1><p>Login administrativo</p><label>Usuário</label><input id="usuario"><label>Senha</label><input id="senha" type="password"><button class="btn-verde" onclick="fazerLogin()">Entrar</button><p id="erroLogin" class="erro"></p></div></div><div id="painel" class="oculto"><header><div id="logoTopo"></div><button class="btn-cinza" onclick="sair()">Sair</button></header><div class="container"><h1 id="nomeCliente">Painel Admin</h1><div class="grid"><div class="card"><h2>Equipamentos</h2><div id="listaEquipamentos"></div></div><div class="card"><h2>Chamados</h2><div id="listaChamados"></div></div></div></div></div><script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co",SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA",DOMINIO="https://sistema.conetfacility.com.br";const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const params=new URLSearchParams(location.search);const academiaId=Number(params.get("academia_id")||1);let academia=null,equipamentos=[],chamados=[];function qrUrl(id){return `${DOMINIO}/equipamento.html?id=${id}&academia_id=${academiaId}`}
async function init(){let a=await supabaseClient.from("academias").select("*").eq("id",academiaId).maybeSingle();academia=a.data;if(academia){tituloLogin.innerText=academia.nome||"ConetFacility";nomeCliente.innerText=academia.nome||"Painel Admin";if(academia.logo_url){logoLoginCliente.innerHTML=`<img src="${academia.logo_url}" style="max-width:150px;display:block;margin:auto">`;logoTopo.innerHTML=`<img src="${academia.logo_url}">`;}}}
async function fazerLogin(){let r=await supabaseClient.from("usuarios_painel_cliente").select("*").eq("academia_id",academiaId).eq("usuario",usuario.value.trim()).eq("senha",senha.value.trim()).eq("status","ATIVO").maybeSingle();if(r.error||!r.data){erroLogin.innerText="Usuário ou senha inválidos.";return}loginArea.classList.add("oculto");painel.classList.remove("oculto");carregarDados();}
function sair(){painel.classList.add("oculto");loginArea.classList.remove("oculto");}
async function carregarDados(){let e=await supabaseClient.from("equipamentos").select("*").eq("academia_id",academiaId).order("id");equipamentos=e.data||[];let ids=equipamentos.map(x=>x.id);let c={data:[]};if(ids.length)c=await supabaseClient.from("chamados").select("*").in("equipamento_id",ids).order("id",{ascending:false});chamados=c.data||[];render();}
function render(){listaEquipamentos.innerHTML=equipamentos.map(e=>`<div class="item"><h3>${e.nome}</h3><p>${e.localizacao||""}</p><a target="_blank" href="${qrUrl(e.id)}">Abrir QR</a></div>`).join("")||"<p>Nenhum equipamento.</p>";listaChamados.innerHTML=chamados.map(c=>`<div class="item"><h3>Chamado #${c.id}</h3><p>${c.status}</p><p>${c.descricao||""}</p></div>`).join("")||"<p>Nenhum chamado.</p>";}init();</script></body></html>
