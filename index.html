<script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co";
const SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let equipamentosGlobais=[];
let chamadosGlobais=[];
let graficoStatus=null;
let graficoPrioridade=null;
let linkAtualQR="";

function verificarLoginSalvo(){
if(localStorage.getItem("gymcare_admin_logado")==="sim"){
document.getElementById("telaLogin").classList.add("oculto");
document.getElementById("telaAdmin").classList.remove("oculto");
carregarDashboard();
}
}

function entrarAdmin(){
const usuario=document.getElementById("usuario").value.trim();
const senha=document.getElementById("senha").value.trim();

if(usuario==="admin"&&senha==="teste01"){
localStorage.setItem("gymcare_admin_logado","sim");
document.getElementById("telaLogin").classList.add("oculto");
document.getElementById("telaAdmin").classList.remove("oculto");
carregarDashboard();
}else{
document.getElementById("erroLogin").innerText="Usuário ou senha inválidos.";
}
}

function sair(){
localStorage.removeItem("gymcare_admin_logado");
location.reload();
}

function toggleCadastroEquipamento(){
document.getElementById("formCadastroEquipamento").classList.toggle("oculto");
}

async function carregarDashboard(){
const {data:equipamentos}=await supabaseClient.from("equipamentos").select("*").eq("academia_id",1).order("id",{ascending:true});
const {data:chamados}=await supabaseClient.from("chamados").select("*").order("id",{ascending:false});

equipamentosGlobais=equipamentos||[];
chamadosGlobais=chamados||[];

atualizarKPIs();
renderizarGraficos();
renderizarRanking();
renderizarAlertas();
renderizarEquipamentos();
renderizarChamados();
}

function atualizarKPIs(){
const ativos=equipamentosGlobais.filter(e=>e.status!=="DESATIVADO").length;
const manutencao=equipamentosGlobais.filter(e=>e.status==="MANUTENCAO").length;
const vencidas=equipamentosGlobais.filter(e=>e.proxima_revisao && new Date(e.proxima_revisao)<new Date()).length;
const disponibilidade=ativos>0 ? Math.round(((ativos-manutencao)/ativos)*100) : 0;

document.getElementById("totalEquipamentos").innerText=ativos;
document.getElementById("chamadosAbertos").innerText=chamadosGlobais.filter(c=>c.status==="ABERTO").length;
document.getElementById("emManutencao").innerText=manutencao;
document.getElementById("revisoesVencidas").innerText=vencidas;
document.getElementById("disponibilidade").innerText=disponibilidade+"%";
document.getElementById("urgentes").innerText=chamadosGlobais.filter(c=>c.prioridade==="URGENTE"||c.prioridade==="ALTA").length;
}

function renderizarGraficos(){
const status={ABERTO:0,EM_MANUTENCAO:0,FINALIZADO:0};
const prioridade={URGENTE:0,ALTA:0,MEDIA:0,BAIXA:0};

chamadosGlobais.forEach(c=>{
if(c.status==="EM MANUTENCAO") status.EM_MANUTENCAO++;
else status[c.status]=(status[c.status]||0)+1;
prioridade[c.prioridade]=(prioridade[c.prioridade]||0)+1;
});

if(graficoStatus)graficoStatus.destroy();
if(graficoPrioridade)graficoPrioridade.destroy();

graficoStatus=new Chart(document.getElementById("graficoStatus"),{
type:"doughnut",
data:{labels:["Aberto","Manutenção","Finalizado"],datasets:[{data:[status.ABERTO,status.EM_MANUTENCAO,status.FINALIZADO]}]}
});

graficoPrioridade=new Chart(document.getElementById("graficoPrioridade"),{
type:"bar",
data:{labels:["Urgente","Alta","Média","Baixa"],datasets:[{data:[prioridade.URGENTE,prioridade.ALTA,prioridade.MEDIA,prioridade.BAIXA]}]}
});
}

function renderizarRanking(){
let ranking={};

chamadosGlobais.forEach(c=>{
ranking[c.equipamento_id]=(ranking[c.equipamento_id]||0)+1;
});

let top=Object.entries(ranking).sort((a,b)=>b[1]-a[1]).slice(0,5);
let html="";

if(top.length===0){
html="<p>Nenhum chamado registrado.</p>";
}else{
top.forEach(([id,total],i)=>{
const eq=equipamentosGlobais.find(e=>e.id==id);
html+=`<div class="ranking-item"><strong>${i+1}. ${eq?.nome||"Equipamento"}</strong><span class="ranking-numero">${total} chamados</span></div>`;
});
}

document.getElementById("rankingEquipamentos").innerHTML=html;
}

function renderizarAlertas(){
const vencidos=equipamentosGlobais.filter(e=>e.proxima_revisao && new Date(e.proxima_revisao)<new Date());

let html="";
if(vencidos.length===0){
html="<p>Nenhum alerta operacional.</p>";
}else{
vencidos.forEach(eq=>{
html+=`<div class="evento"><strong>Revisão vencida</strong><p>${eq.nome}</p><p>Venceu em ${eq.proxima_revisao}</p></div>`;
});
}

document.getElementById("alertasOperacionais").innerHTML=html;
}

function classeStatus(status){
if(status==="OPERACIONAL")return"status status-ok";
if(status==="MANUTENCAO"||status==="EM MANUTENCAO")return"status status-andamento";
if(status==="BLOQUEADO")return"status status-alerta";
return"status status-desativado";
}

async function cadastrarEquipamento(){
const nome=document.getElementById("novoNome").value.trim();
const categoria=document.getElementById("novaCategoria").value.trim();
const marca=document.getElementById("novaMarca").value.trim();
const modelo=document.getElementById("novoModelo").value.trim();
const numeroSerie=document.getElementById("novoSerie").value.trim();
const localizacao=document.getElementById("novaLocalizacao").value.trim();
const codigo=document.getElementById("novoCodigo").value.trim().toUpperCase();
const proximaRevisao=document.getElementById("novaProximaRevisao").value;

if(!nome||!codigo){
document.getElementById("erroCadastro").innerText="Nome e ID são obrigatórios.";
return;
}

const {data:novo,error}=await supabaseClient.from("equipamentos").insert([{
academia_id:1,nome,categoria,marca,modelo,numero_serie:numeroSerie,localizacao,status:"OPERACIONAL",codigo_publico:codigo,proxima_revisao:proximaRevisao||null
}]).select().single();

if(error){
document.getElementById("erroCadastro").innerText=error.message;
return;
}

await supabaseClient.from("equipamentos").update({
qr_code:`https://gymcareqr.vercel.app/equipamento.html?id=${novo.id}`
}).eq("id",novo.id);

toggleCadastroEquipamento();
carregarDashboard();
}

function renderizarEquipamentos(){
const busca=document.getElementById("buscaEquipamento").value.toLowerCase();
const filtro=document.getElementById("filtroStatusEquipamento").value;

let html="";

equipamentosGlobais.filter(eq=>{
const matchBusca=(eq.nome||"").toLowerCase().includes(busca)||(eq.categoria||"").toLowerCase().includes(busca)||(eq.codigo_publico||"").toLowerCase().includes(busca);
const matchStatus=filtro==="TODOS"||eq.status===filtro;
return matchBusca&&matchStatus;
}).forEach(eq=>{
html+=`
<div class="item">
<h3>${eq.nome}</h3>
<p><strong>Categoria:</strong> ${eq.categoria||"-"}</p>
<p><strong>ID:</strong> ${eq.codigo_publico||"-"}</p>
<div class="${classeStatus(eq.status)}">${eq.status}</div>
<div class="botoes">
<button class="btn-azul" onclick="abrirEditar(${eq.id})">Editar</button>
<button class="btn-verde" onclick="abrirQR('${eq.nome}','${eq.qr_code||""}')">QR</button>
<button class="btn-cinza" onclick="abrirHistorico(${eq.id},'${eq.nome}')">Histórico</button>
<button class="btn-vermelho" onclick="desativarEquipamento(${eq.id},'${eq.nome}')">Desativar</button>
</div>
</div>`;
});

document.getElementById("listaEquipamentos").innerHTML=html||"<p>Nenhum equipamento encontrado.</p>";
}

async function alterarStatusChamado(chamadoId,equipamentoId,novoStatus){
await supabaseClient.from("chamados").update({status:novoStatus}).eq("id",chamadoId);

let statusEquipamento="OPERACIONAL";
if(novoStatus==="EM MANUTENCAO") statusEquipamento="MANUTENCAO";

await supabaseClient.from("equipamentos").update({status:statusEquipamento}).eq("id",equipamentoId);

await supabaseClient.from("historico_manutencao").insert([{
equipamento_id:equipamentoId,
chamado_id:chamadoId,
tipo_evento:"ALTERAÇÃO DE STATUS",
descricao:"Chamado alterado para "+novoStatus,
status:novoStatus
}]);

carregarDashboard();
}

function renderizarChamados(){
const filtroStatus=document.getElementById("filtroStatus").value;
const filtroPrioridade=document.getElementById("filtroPrioridade").value;
const busca=document.getElementById("buscaChamado").value.toLowerCase();

let chamados=[...chamadosGlobais];

chamados=chamados.filter(c=>{
const eq=equipamentosGlobais.find(e=>e.id===c.equipamento_id);
const nomeEquipamento=eq?.nome?.toLowerCase()||"";

return (filtroStatus==="TODOS"||c.status===filtroStatus)
&&(filtroPrioridade==="TODAS"||c.prioridade===filtroPrioridade)
&&(!busca||nomeEquipamento.includes(busca)||(c.descricao||"").toLowerCase().includes(busca)||(c.tipo_problema||"").toLowerCase().includes(busca));
});

let html="";

chamados.forEach(c=>{
const eq=equipamentosGlobais.find(e=>e.id===c.equipamento_id);

html+=`
<div class="item">
<h3>Chamado #${c.id}</h3>
<p><strong>Equipamento:</strong> ${eq?.nome||"-"}</p>
<p><strong>Tipo:</strong> ${c.tipo_problema||"-"}</p>
<p><strong>Descrição:</strong> ${c.descricao||"-"}</p>
<p><strong>Prioridade:</strong> ${c.prioridade||"-"}</p>
<p><strong>Status:</strong> ${c.status}</p>

<div class="botoes">
<button class="btn-amarelo" onclick="alterarStatusChamado(${c.id},${c.equipamento_id},'EM MANUTENCAO')">Em manutenção</button>
<button class="btn-verde" onclick="alterarStatusChamado(${c.id},${c.equipamento_id},'FINALIZADO')">Finalizar</button>
<button class="btn-cinza" onclick="alterarStatusChamado(${c.id},${c.equipamento_id},'ABERTO')">Reabrir</button>
<button class="btn-cinza" onclick="abrirHistorico(${c.equipamento_id},'${eq?.nome||"Equipamento"}')">Histórico</button>
</div>
</div>`;
});

document.getElementById("listaChamados").innerHTML=html||"<p>Nenhum chamado encontrado.</p>";
}

function abrirQR(nome,link){
document.getElementById("modalQR").classList.remove("oculto");
document.getElementById("modalQR").style.display="flex";
document.getElementById("tituloQR").innerText=`QR - ${nome}`;
document.getElementById("linkQR").innerText=link;
linkAtualQR=link;
}

function fecharQR(){
document.getElementById("modalQR").classList.add("oculto");
document.getElementById("modalQR").style.display="none";
}

function copiarLinkQR(){
navigator.clipboard.writeText(linkAtualQR);
document.getElementById("sucessoQR").innerText="Link copiado.";
}

function abrirEditar(id){
alert("Edição completa será restaurada na próxima etapa.");
}

async function desativarEquipamento(id,nome){
if(!confirm(`Desativar ${nome}?`))return;
await supabaseClient.from("equipamentos").update({status:"DESATIVADO"}).eq("id",id);
carregarDashboard();
}

async function abrirHistorico(id,nome){
document.getElementById("tituloHistorico").innerText=`Histórico - ${nome}`;
document.getElementById("modalHistorico").classList.remove("oculto");
document.getElementById("modalHistorico").style.display="flex";

const {data}=await supabaseClient.from("historico_manutencao").select("*").eq("equipamento_id",id).order("criado_em",{ascending:false});

let html="";
if(!data||data.length===0){
html="<p>Nenhum histórico.</p>";
}else{
data.forEach(ev=>{
html+=`<div class="evento"><strong>${ev.tipo_evento||"Evento"}</strong><p>${ev.descricao||"-"}</p></div>`;
});
}

document.getElementById("conteudoHistorico").innerHTML=html;
}

function fecharHistorico(){
document.getElementById("modalHistorico").classList.add("oculto");
document.getElementById("modalHistorico").style.display="none";
}

verificarLoginSalvo();
</script>

</body>
</html>
