<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymCare QR</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f3f4f6;
    }

    header{
      background:#111827;
      color:white;
      padding:20px;
    }

    header h1{
      font-size:32px;
    }

    .container{
      padding:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      background:white;
      border-radius:15px;
      padding:25px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    .card h3{
      color:#374151;
      margin-bottom:10px;
    }

    .number{
      font-size:32px;
      font-weight:bold;
      color:#16a34a;
    }

    .equipamento{
      margin-top:30px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    .btn{
      background:#16a34a;
      color:white;
      border:none;
      padding:15px 20px;
      border-radius:10px;
      cursor:pointer;
      margin-top:20px;
      font-size:16px;
    }

    .btn:hover{
      background:#15803d;
    }
  </style>
</head>

<body>

<header>
  <h1>GymCare QR</h1>
  <p>Gestão inteligente de equipamentos para academias</p>
</header>

<div class="container">

  <h2>Dashboard</h2>

  <div class="cards">

    <div class="card">
      <h3>Equipamentos</h3>
      <div class="number">1</div>
    </div>

    <div class="card">
      <h3>Chamados abertos</h3>
      <div class="number">1</div>
    </div>

    <div class="card">
      <h3>Em manutenção</h3>
      <div class="number">0</div>
    </div>

    <div class="card">
      <h3>Revisões pendentes</h3>
      <div class="number">0</div>
    </div>

  </div>

  <div class="equipamento">

    <h2>Esteira 01</h2>

    <p><strong>Status:</strong> Operacional</p>
    <p><strong>Localização:</strong> Área Cardio</p>
    <p><strong>Última revisão:</strong> 24/05/2026</p>
    <p><strong>Próxima revisão:</strong> 23/06/2026</p>

    <button class="btn">
      Solicitar manutenção
    </button>

  </div>

</div>

</body>
</html>
