<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymCare QR - Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f3f4f6;color:#111827}
.oculto{display:none!important}

.login{
max-width:420px;
margin:80px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

input,select{
width:100%;
padding:12px;
margin:8px 0 16px;
border:1px solid #ddd;
border-radius:10px;
}

button{
border:none;
padding:12px 16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn-verde{background:#93D500}
.btn-amarelo{background:#facc15}
.btn-cinza{background:#e5e7eb}
.btn-vermelho{background:#ef4444;color:white}

header{
background:#323E48;
color:white;
padding:22px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo h1{color:#93D500}

.container{padding:30px}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin:25px 0;
}

.card,.bloco{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.numero{
font-size:34px;
font-weight:bold;
color:#93D500;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.grid-graficos{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.item{
padding:16px 0;
border-bottom:1px solid #e5e7eb;
}

.item:last-child{border-bottom:none}

.botoes{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-top:10px;
}

.status-ok{background:#dcfce7;color:#166534}
.status-andamento{background:#fef3c7;color:#92400e}
.status-alerta{background:#fef3c7;color:#92400e}
.status-desativado{background:#e5e7eb;color:#374151}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.modal-box{
background:white;
padding:25px;
border-radius:20px;
width:100%;
max-width:700px;
max-height:85vh;
overflow:auto;
}

.timeline{
border-left:4px solid #93D500;
padding-left:16px;
margin-top:20px;
}

.evento{
background:#f9fafb;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

.etiqueta{
background:white;
border:2px solid #323E48;
border-radius:18px;
padding:20px;
text-align:center;
max-width:320px;
margin:auto;
}

.etiqueta h3{color:#323E48}
.etiqueta p{margin:8px 0}

@media(max-width:900px){
.grid,.grid-graficos{grid-template-columns:1fr}
header{flex-direction:column;gap:10px}
}
</style>
</head>

<body>

<div id="telaLogin" class="login">
<h1>GymCare QR</h1>
<p>Login administrativo</p>

<label>Usuário</label>
<input type="text" id="usuario" placeholder="admin">

<label>Senha</label>
<input type="password" id="senha" placeholder="teste01">

<button class="btn-verde" onclick="entrarAdmin()">Entrar</button>
<p id="erroLogin" style="color:red;margin-top:10px;"></p>
</div>

<div id="telaAdmin" class="oculto">

<header>
<div class="logo">
<h1>GymCare QR</h1>
<p>Dashboard Inteligente</p>
</div>

<button class="btn-cinza" onclick="sair()">Sair</button>
</header>

<div class="container">

<div class="cards">
<div class="card"><h3>Equipamentos ativos</h3><div class="numero" id="totalEquipamentos">0</div></div>
<div class="card"><h3>Chamados abertos</h3><div class="numero" id="chamadosAbertos">0</div></div>
<div class="card"><h3>Em manutenção</h3><div class="numero" id="emManutencao">0</div></div>
<div class="card"><h3>Disponibilidade</h3><div class="numero" id="disponibilidade">0%</div></div>
</div>

<div class="grid-graficos">
<div class="bloco">
<h3>Status chamados</h3>
<canvas id="graficoStatus"></canvas>
</div>

<div class="bloco">
<h3>Prioridades</h3>
<canvas id="graficoPrioridade"></canvas>
</div>
</div>

<div class="grid">
<div class="bloco">
<h2>Equipamentos</h2>
<div id="listaEquipamentos"></div>
</div>

<div class="bloco">
<h2>Chamados</h2>
<div id="listaChamados"></div>
</div>
</div>

</div>
</div>

<div class="modal" id="modalHistorico">
<div class="modal-box">
<h2 id="tituloHistorico"></h2>
<div id="conteudoHistorico" class="timeline"></div>
<br>
<button class="btn-cinza" onclick="fecharHistorico()">Fechar</button>
</div>
</div>

<div class="modal" id="modalEtiquetaQR">
<div class="modal-box">
<h2>Etiqueta QR Profissional</h2>

<div id="etiquetaQR" class="etiqueta">
<h3>Move Academia</h3>
<p id="qrNomeEquipamento" style="font-weight:bold;"></p>
<p id="qrCodigoEquipamento" style="font-size:14px;"></p>
<canvas id="canvasQR"></canvas>
<p style="font-size:12px;margin-top:10px;">GymCare QR</p>
</div>

<br>

<button class="btn-verde" onclick="baixarEtiquetaQR()">Baixar PNG</button>
<button class="btn-cinza" onclick="fecharEtiquetaQR()">Fechar</button>
</div>
</div>

<script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co";
const SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let equipamentos=[];
let chamados=[];
let graficoStatus=null;
let graficoPrioridade=null;

function mostrarAdmin(){
document.getElementById("telaLogin").classList.add("oculto");
document.getElementById("telaLogin").style.display="none";
document.getElementById("telaAdmin").classList.remove("oculto");
document.getElementById("telaAdmin").style.display="block";
carregarDados();
}

function entrarAdmin(){
const usuario=document.getElementById("usuario").value.trim();
const senha=document.getElementById("senha").value.trim();

if(usuario==="admin"&&senha==="teste01"){
localStorage.setItem("gymcare_admin_logado","sim");
mostrarAdmin();
}else{
document.getElementById("erroLogin").innerText="Usuário ou senha inválidos.";
}
}

function verificarLogin(){
if(localStorage.getItem("gymcare_admin_logado")==="sim"){
mostrarAdmin();
}
}

function sair(){
localStorage.removeItem("gymcare_admin_logado");
location.reload();
}

async function carregarDados(){
const {data:equip,error:erroEquip}=await supabaseClient
.from("equipamentos")
.select("*")
.eq("academia_id",1)
.order("id",{ascending:true});

const {data:cham,error:erroCham}=await supabaseClient
.from("chamados")
.select("*")
.order("id",{ascending:false});

if(erroEquip || erroCham){
console.error(erroEquip || erroCham);
return;
}

equipamentos=equip||[];
chamados=cham||[];

atualizarCards();
renderizarGraficos();
renderizarEquipamentos();
renderizarChamados();
}

function atualizarCards(){
const ativos=equipamentos.filter(e=>e.status!=="DESATIVADO").length;
const manutencao=equipamentos.filter(e=>e.status==="MANUTENCAO").length;
const disponibilidade=ativos>0 ? Math.round(((ativos-manutencao)/ativos)*100) : 0;

document.getElementById("totalEquipamentos").innerText=ativos;
document.getElementById("chamadosAbertos").innerText=chamados.filter(c=>c.status==="ABERTO").length;
document.getElementById("emManutencao").innerText=manutencao;
document.getElementById("disponibilidade").innerText=disponibilidade+"%";
}

function renderizarGraficos(){
const status={ABERTO:0,EM_MANUTENCAO:0,FINALIZADO:0};
const prioridade={URGENTE:0,ALTA:0,MEDIA:0,BAIXA:0};

chamados.forEach(c=>{
if(c.status==="ABERTO")status.ABERTO++;
else if(c.status==="EM MANUTENCAO")status.EM_MANUTENCAO++;
else if(c.status==="FINALIZADO")status.FINALIZADO++;

if(c.prioridade==="URGENTE")prioridade.URGENTE++;
else if(c.prioridade==="ALTA")prioridade.ALTA++;
else if(c.prioridade==="MEDIA")prioridade.MEDIA++;
else prioridade.BAIXA++;
});

if(graficoStatus)graficoStatus.destroy();
if(graficoPrioridade)graficoPrioridade.destroy();

graficoStatus=new Chart(document.getElementById("graficoStatus"),{
type:"doughnut",
data:{
labels:["Aberto","Manutenção","Finalizado"],
datasets:[{data:[status.ABERTO,status.EM_MANUTENCAO,status.FINALIZADO]}]
}
});

graficoPrioridade=new Chart(document.getElementById("graficoPrioridade"),{
type:"bar",
data:{
labels:["Urgente","Alta","Média","Baixa"],
datasets:[{data:[prioridade.URGENTE,prioridade.ALTA,prioridade.MEDIA,prioridade.BAIXA]}]
}
});
}

function classeStatus(status){
if(status==="OPERACIONAL")return"status status-ok";
if(status==="MANUTENCAO"||status==="EM MANUTENCAO")return"status status-andamento";
if(status==="BLOQUEADO")return"status status-alerta";
return"status status-desativado";
}

function renderizarEquipamentos(){
let html="";

equipamentos.forEach(eq=>{
html+=`
<div class="item">
<h3>${eq.nome}</h3>
<p><strong>Categoria:</strong> ${eq.categoria||"-"}</p>
<p><strong>ID:</strong> ${eq.codigo_publico||"-"}</p>
<p><strong>Local:</strong> ${eq.localizacao||"-"}</p>

<div class="${classeStatus(eq.status)}">
${eq.status||"OPERACIONAL"}
</div>

<div class="botoes">
<button class="btn-verde" onclick="abrirEtiquetaQR('${limpar(eq.nome)}','${eq.codigo_publico||"-"}','${eq.qr_code||""}')">QR Premium</button>
<button class="btn-cinza" onclick="abrirHistorico(${eq.id},'${limpar(eq.nome)}')">Histórico</button>
<button class="btn-vermelho" onclick="desativarEquipamento(${eq.id},'${limpar(eq.nome)}')">Desativar</button>
</div>
</div>
`;
});

document.getElementById("listaEquipamentos").innerHTML=html||"<p>Nenhum equipamento cadastrado.</p>";
}

function renderizarChamados(){
let html="";

chamados.forEach(ch=>{
const eq=equipamentos.find(e=>e.id===ch.equipamento_id);

html+=`
<div class="item">
<h3>Chamado #${ch.id}</h3>
<p><strong>Equipamento:</strong> ${eq?.nome||"-"}</p>
<p><strong>Tipo:</strong> ${ch.tipo_problema||"-"}</p>
<p><strong>Descrição:</strong> ${ch.descricao||"-"}</p>
<p><strong>Prioridade:</strong> ${ch.prioridade||"-"}</p>
<p><strong>Status:</strong> ${ch.status||"-"}</p>

<div class="botoes">
<button class="btn-amarelo" onclick="alterarStatusChamado(${ch.id},${ch.equipamento_id},'EM MANUTENCAO')">Em manutenção</button>
<button class="btn-verde" onclick="alterarStatusChamado(${ch.id},${ch.equipamento_id},'FINALIZADO')">Finalizar</button>
<button class="btn-cinza" onclick="alterarStatusChamado(${ch.id},${ch.equipamento_id},'ABERTO')">Reabrir</button>
<button class="btn-cinza" onclick="abrirHistorico(${ch.equipamento_id},'${limpar(eq?.nome||"Equipamento")}')">Histórico</button>
</div>
</div>
`;
});

document.getElementById("listaChamados").innerHTML=html||"<p>Nenhum chamado encontrado.</p>";
}

async function alterarStatusChamado(chamadoId,equipamentoId,novoStatus){
await supabaseClient
.from("chamados")
.update({status:novoStatus})
.eq("id",chamadoId);

let statusEquipamento="OPERACIONAL";

if(novoStatus==="EM MANUTENCAO"){
statusEquipamento="MANUTENCAO";
}

await supabaseClient
.from("equipamentos")
.update({status:statusEquipamento})
.eq("id",equipamentoId);

await supabaseClient
.from("historico_manutencao")
.insert([{
equipamento_id:equipamentoId,
chamado_id:chamadoId,
tipo_evento:"ALTERAÇÃO DE STATUS",
descricao:"Chamado alterado para "+novoStatus,
status:novoStatus
}]);

carregarDados();
}

async function desativarEquipamento(id,nome){
if(!confirm("Deseja desativar "+nome+"?"))return;

await supabaseClient
.from("equipamentos")
.update({status:"DESATIVADO"})
.eq("id",id);

carregarDados();
}

async function abrirHistorico(id,nome){
document.getElementById("tituloHistorico").innerText="Histórico - "+nome;
document.getElementById("modalHistorico").style.display="flex";

const {data}=await supabaseClient
.from("historico_manutencao")
.select("*")
.eq("equipamento_id",id)
.order("criado_em",{ascending:false});

let html="";

if(!data||data.length===0){
html="<p>Nenhum histórico registrado.</p>";
}else{
data.forEach(ev=>{
html+=`
<div class="evento">
<strong>${ev.tipo_evento||"Evento"}</strong>
<p>${ev.descricao||"-"}</p>
<p><strong>Status:</strong> ${ev.status||"-"}</p>
</div>
`;
});
}

document.getElementById("conteudoHistorico").innerHTML=html;
}

function fecharHistorico(){
document.getElementById("modalHistorico").style.display="none";
}

function abrirEtiquetaQR(nome,codigo,link){
document.getElementById("modalEtiquetaQR").style.display="flex";
document.getElementById("qrNomeEquipamento").innerText=nome;
document.getElementById("qrCodigoEquipamento").innerText="ID: "+codigo;

const canvas=document.getElementById("canvasQR");

QRCode.toCanvas(canvas,link,{
width:180,
margin:1
});
}

function fecharEtiquetaQR(){
document.getElementById("modalEtiquetaQR").style.display="none";
}

function baixarEtiquetaQR(){
const etiqueta=document.getElementById("etiquetaQR");

html2canvas(etiqueta).then(canvas=>{
const link=document.createElement("a");
link.download="etiqueta-gymcare-qr.png";
link.href=canvas.toDataURL();
link.click();
});
}

function limpar(texto){
return String(texto||"").replace(/'/g,"").replace(/"/g,"");
}

verificarLogin();
</script>

</body>
</html>
