<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ConetFacility - Equipamento</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#f3f4f6;color:#111827}.oculto{display:none!important}
input,select,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:10px}textarea{min-height:90px}
button{border:0;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer}.btn-verde{background:#93D500;color:#111827}.btn-cinza{background:#e5e7eb}.btn-azul{background:#3B82F6;color:white}.btn-vermelho{background:#ef4444;color:white}
.erro{color:#dc2626;font-weight:bold}.sucesso{color:#15803d;font-weight:bold}.card,.bloco{background:white;padding:25px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08);margin-bottom:20px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}.login-card{max-width:620px;width:100%;background:white;border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,.08);padding:42px}.logo-login{text-align:center;margin-bottom:22px}.logo-login img{width:220px;max-width:82%;border-radius:18px;box-shadow:0 8px 22px rgba(0,0,0,.12)}
header{background:#323E48;color:white;padding:20px 35px;display:flex;align-items:center;justify-content:space-between}header img{max-width:180px;max-height:80px;object-fit:contain}.container{padding:30px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:25px 0}.numero{font-size:34px;font-weight:bold;color:#93D500}.item{border-bottom:1px solid #e5e7eb;padding:15px 0}.botoes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.logo-preview{max-width:160px;max-height:70px;object-fit:contain}
@media(max-width:900px){.grid{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}}
.card{max-width:760px;margin:35px auto}</style></head><body><div class="card"><div id="topo"></div><h1 id="titulo">Carregando...</h1><p id="infoEquip"></p><h2>Abrir chamado</h2><input id="tipoProblema" placeholder="Tipo do problema"><select id="prioridade"><option>NORMAL</option><option>ALTA</option><option>URGENTE</option></select><textarea id="descricao" placeholder="Descrição"></textarea><button class="btn-verde" onclick="abrirChamado()">Abrir Chamado</button><p id="msg" class="sucesso"></p><p id="erro" class="erro"></p><h2>Chamados abertos / em andamento</h2><div id="listaChamados"></div></div><script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co",SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const p=new URLSearchParams(location.search),equipamentoId=Number(p.get("id")),academiaId=Number(p.get("academia_id"));let equipamento=null,academia=null;
async function init(){if(!equipamentoId||!academiaId){titulo.innerText="QR Code inválido";return}let [e,a]=await Promise.all([supabaseClient.from("equipamentos").select("*").eq("id",equipamentoId).maybeSingle(),supabaseClient.from("academias").select("*").eq("id",academiaId).maybeSingle()]);equipamento=e.data;academia=a.data;if(academia?.logo_url)topo.innerHTML=`<img src="${academia.logo_url}" style="max-width:150px;display:block;margin:auto">`;titulo.innerText=equipamento?.nome||"Equipamento";infoEquip.innerText=equipamento?.localizacao||"";carregarChamados();}
async function abrirChamado(){let r=await supabaseClient.from("chamados").insert([{equipamento_id:equipamentoId,tipo_problema:tipoProblema.value.trim(),prioridade:prioridade.value,descricao:descricao.value.trim(),status:"ABERTO",created_at:new Date().toISOString()}]);if(r.error)erro.innerText=r.error.message;else{msg.innerText="Chamado aberto com sucesso.";descricao.value="";carregarChamados();}}
async function carregarChamados(){let eqs=await supabaseClient.from("equipamentos").select("id").eq("academia_id",academiaId);let ids=(eqs.data||[]).map(e=>e.id);if(!ids.length){listaChamados.innerHTML="<p>Nenhum chamado.</p>";return}let c=await supabaseClient.from("chamados").select("*").in("equipamento_id",ids).in("status",["ABERTO","EM MANUTENCAO","EM ANDAMENTO"]).order("id",{ascending:false});listaChamados.innerHTML=(c.data||[]).map(ch=>`<div class="item"><h3>Chamado #${ch.id}</h3><p>${ch.status}</p><p>${ch.descricao||""}</p><textarea id="obs_${ch.id}" placeholder="O que foi feito?"></textarea><button class="btn-vermelho" onclick="encerrarChamado(${ch.id})">Encerrar chamado</button></div>`).join("")||"<p>Nenhum chamado aberto.</p>";}
async function encerrarChamado(id){let obs=document.getElementById("obs_"+id)?.value||"";await supabaseClient.from("chamados").update({status:"FINALIZADO",observacao_encerramento:obs,encerrado_em:new Date().toISOString()}).eq("id",id);carregarChamados();}init();</script></body></html>
