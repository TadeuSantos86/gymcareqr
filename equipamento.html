<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solicitar Manutenção | ConetFacility</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:#f3f4f6;color:#111827;padding:24px}.card{max-width:760px;margin:0 auto;background:white;border-radius:20px;padding:30px;box-shadow:0 5px 20px rgba(0,0,0,.08)}h1{color:var(--cor,#93D500);margin-bottom:10px}.logo{max-height:80px;max-width:220px;object-fit:contain;margin-bottom:18px}.subtitulo{color:#6b7280;margin-bottom:25px}label{display:block;margin-top:18px;margin-bottom:8px;font-weight:bold}input,select,textarea{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:15px}textarea{resize:none;min-height:120px}button{width:100%;margin-top:20px;padding:16px;border:none;border-radius:14px;background:var(--cor,#93D500);font-size:16px;font-weight:bold;cursor:pointer}.btn-cinza{background:#e5e7eb}.info{background:#f9fafb;padding:18px;border-radius:14px;margin-bottom:20px}.info p{margin:7px 0}.msg{margin-top:20px;text-align:center;font-weight:bold}.sucesso{color:#15803d}.erro{color:#dc2626}.alerta{background:#fef3c7;color:#92400e;padding:14px;border-radius:12px;margin-bottom:20px;font-weight:bold}.oculto{display:none!important}.status{display:inline-block;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:bold}.status-operacional{background:#dcfce7;color:#166534}.status-manutencao{background:#fef3c7;color:#92400e}.status-bloqueado{background:#fef3c7;color:#92400e}.status-desativado{background:#e5e7eb;color:#374151}@media(max-width:700px){body{padding:12px}.card{padding:22px}}
</style></head><body><div class="card"><img id="logoCliente" class="logo oculto"><div id="loginArea"><h1 id="tituloLogin">ConetFacility</h1><p class="subtitulo" id="subtituloLogin"></p><label>Usuário</label><input type="text" id="usuario" placeholder="equipamento01"><label>Senha</label><input type="password" id="senha" placeholder="teste01"><button onclick="fazerLogin()">Entrar</button><p id="erroLogin" class="msg erro"></p></div><div id="buscaArea" class="oculto"><h1>Identificar equipamento</h1><p class="subtitulo">Escaneie o QR Code ou digite o ID discreto do equipamento.</p><label>ID do equipamento</label><input type="text" id="codigoEquipamento" placeholder="Exemplo: EQ-001"><button onclick="buscarPorCodigo()">Buscar equipamento</button><p id="erroBusca" class="msg erro"></p></div><div id="painelEquipamento" class="oculto"><h1 id="nomeEquipamento">Equipamento</h1><p class="subtitulo">Solicitação de manutenção</p><div class="info"><p><strong>Categoria / Área:</strong> <span id="categoria"></span></p><p><strong>Marca:</strong> <span id="marca"></span></p><p><strong>Modelo:</strong> <span id="modelo"></span></p><p><strong>Número de série:</strong> <span id="serie"></span></p><p><strong>Localização:</strong> <span id="localizacao"></span></p><p><strong>ID discreto:</strong> <span id="codigoPublico"></span></p><p><strong>Status:</strong> <span id="status" class="status"></span></p></div><div id="avisoChamado" class="alerta oculto">Já existe uma solicitação em andamento para este equipamento.</div><label>Tipo do problema</label><select id="tipoProblema"><option value="Quebrado">Quebrado</option><option value="Barulho estranho">Barulho estranho</option><option value="Falha elétrica">Falha elétrica</option><option value="Revisão preventiva">Revisão preventiva</option><option value="Outro">Outro</option></select><label>Prioridade</label><select id="prioridade"><option value="BAIXA">Baixa</option><option value="MEDIA">Média</option><option value="ALTA">Alta</option><option value="URGENTE">Urgente</option></select><label>Descrição</label><textarea id="descricao"></textarea><button id="btnAbrirChamado" onclick="abrirChamado()">Solicitar manutenção</button><button class="btn-cinza" onclick="voltarBusca()">Escolher outro equipamento</button><p id="mensagem" class="msg"></p></div></div>
<script>
const SUPABASE_URL="https://juwbkfhfmygduktuzqmu.supabase.co";const SUPABASE_KEY="sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const EMAILJS_SERVICE_ID="service_i6mlqzr";const EMAILJS_TEMPLATE_ID="template_dec814j";const EMAILJS_PUBLIC_KEY="aXBqSvpRwjN9R_QNu";emailjs.init({publicKey:EMAILJS_PUBLIC_KEY});let equipamentoAtual=null,academiaAtual=null,usuarioLogadoChamado='';function param(n){return new URLSearchParams(location.search).get(n)}function academiaIdAtual(){return Number(param("academia_id"))||1}function normalizarStatus(s){if(s==="MANUTENCAO"||s==="EM MANUTENCAO")return"EM_MANUTENCAO";if(s==="OPERACIONAL")return"OPERACIONAL";if(s==="BLOQUEADO")return"BLOQUEADO";if(s==="DESATIVADO")return"DESATIVADO";return s||"OPERACIONAL"}function textoStatus(s){const x=normalizarStatus(s);return x==="EM_MANUTENCAO"?"Em manutenção":x==="OPERACIONAL"?"Operacional":x==="BLOQUEADO"?"Bloqueado":x==="DESATIVADO"?"Desativado":x==="ABERTO"?"Aberto":x==="FINALIZADO"?"Finalizado":s||"Operacional"}function classeStatus(s){const x=normalizarStatus(s);if(x==="OPERACIONAL")return"status status-operacional";if(x==="EM_MANUTENCAO")return"status status-manutencao";if(x==="BLOQUEADO")return"status status-bloqueado";return"status status-desativado"}async function carregarAcademia(id){const {data}=await supabaseClient.from("academias").select("*").eq("id",id).maybeSingle();academiaAtual=data||{};document.documentElement.style.setProperty("--cor",academiaAtual.cor_primaria||"#93D500");document.getElementById("tituloLogin").innerText=academiaAtual.titulo_sistema||"ConetFacility";document.getElementById("subtituloLogin").innerText=academiaAtual.subtitulo_sistema||"";const logo=document.getElementById("logoCliente");if(academiaAtual.logo_url){logo.src=academiaAtual.logo_url;logo.classList.remove("oculto")}else logo.classList.add("oculto")}carregarAcademia(academiaIdAtual());
async function validarUsuarioChamado(usuario,senha,academiaId){
const {data,error}=await supabaseClient
.from("usuarios_chamados")
.select("*")
.eq("academia_id",academiaId)
.eq("usuario",usuario)
.eq("senha",senha)
.eq("status","ATIVO")
.maybeSingle();

if(error){
console.error("Erro ao validar usuário:",error);
return false;
}

if(data)return true;

/* acesso padrão temporário para testes, até todos os clientes terem usuários cadastrados */
if(usuario==="equipamento01"&&senha==="teste01"){
return true;
}

return false;
}

async function fazerLogin(){
const u=document.getElementById("usuario").value.trim();
const s=document.getElementById("senha").value.trim();

let academiaLoginId=academiaIdAtual();
const idEquipamento=param("id");

if(idEquipamento){
const {data:eqTemp}=await supabaseClient
.from("equipamentos")
.select("academia_id")
.eq("id",Number(idEquipamento))
.maybeSingle();

if(eqTemp?.academia_id){
academiaLoginId=eqTemp.academia_id;
await carregarAcademia(academiaLoginId);
}
}

const permitido=await validarUsuarioChamado(u,s,academiaLoginId);

if(permitido){
usuarioLogadoChamado=u;
document.getElementById("loginArea").classList.add("oculto");

const id=param("id");

if(id){
carregarEquipamentoPorId(id);
}else{
document.getElementById("buscaArea").classList.remove("oculto");
}
}else{
document.getElementById("erroLogin").innerText="Usuário ou senha inválidos.";
}
}
async function carregarEquipamentoPorId(id){
const {data}=await supabaseClient.from("equipamentos").select("*").eq("id",Number(id)).maybeSingle();

if(!data){
document.getElementById("buscaArea").classList.remove("oculto");
document.getElementById("erroBusca").innerText="Equipamento não encontrado. Digite o ID discreto.";
return;
}

await carregarAcademia(data.academia_id||1);

const params=new URLSearchParams(location.search);
if(String(params.get("academia_id")||"")!==String(data.academia_id||"")){
params.set("academia_id",data.academia_id||1);
params.set("id",data.id);
history.replaceState(null,"",location.pathname+"?"+params.toString());
}

mostrarEquipamento(data);
}
async function buscarPorCodigo(){const codigo=document.getElementById("codigoEquipamento").value.trim().toUpperCase();if(!codigo){document.getElementById("erroBusca").innerText="Digite o ID do equipamento.";return}const {data}=await supabaseClient.from("equipamentos").select("*").eq("codigo_publico",codigo).eq("academia_id",academiaIdAtual()).maybeSingle();if(!data){document.getElementById("erroBusca").innerText="Equipamento não encontrado.";return}mostrarEquipamento(data)}
function mostrarEquipamento(d){equipamentoAtual=d;document.getElementById("buscaArea").classList.add("oculto");document.getElementById("painelEquipamento").classList.remove("oculto");document.getElementById("nomeEquipamento").innerText=d.nome||"Equipamento";["categoria","marca","modelo","localizacao"].forEach(k=>document.getElementById(k).innerText=d[k]||"-");document.getElementById("serie").innerText=d.numero_serie||"-";document.getElementById("codigoPublico").innerText=d.codigo_publico||"-";const se=document.getElementById("status");se.innerText=textoStatus(d.status);se.className=classeStatus(d.status);document.getElementById("descricao").value="";document.getElementById("mensagem").innerText="";document.getElementById("avisoChamado").classList.add("oculto");document.getElementById("btnAbrirChamado").disabled=false;document.getElementById("btnAbrirChamado").style.opacity="1";verificarChamadoAberto()}
function voltarBusca(){document.getElementById("painelEquipamento").classList.add("oculto");document.getElementById("buscaArea").classList.remove("oculto");document.getElementById("codigoEquipamento").value="";equipamentoAtual=null}
async function verificarChamadoAberto(){const {data}=await supabaseClient.from("chamados").select("*").eq("equipamento_id",equipamentoAtual.id).in("status",["ABERTO","EM MANUTENCAO","MANUTENCAO"]);if(data&&data.length>0){document.getElementById("avisoChamado").classList.remove("oculto");document.getElementById("btnAbrirChamado").disabled=true;document.getElementById("btnAbrirChamado").style.opacity=".5"}}
async function registrarHistorico(equipamentoId,chamadoId,tipoEvento,descricao,status){await supabaseClient.from("historico_manutencao").insert([{equipamento_id:equipamentoId,chamado_id:chamadoId,tipo_evento:tipoEvento,descricao,status}])}
async function enviarEmailNotificacao(ch,tipo,prior,desc){try{const emailDestino=academiaAtual?.email_notificacao;if(!emailDestino)return;await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{email_destino:emailDestino,academia_nome:academiaAtual?.nome||"Academia",equipamento_nome:equipamentoAtual?.nome||"Equipamento",equipamento_codigo:equipamentoAtual?.codigo_publico||"-",equipamento_localizacao:equipamentoAtual?.localizacao||"-",tipo_problema:tipo,prioridade:prior,descricao:desc,status:"Aberto",usuario_abertura:usuarioLogadoChamado||"Não informado",data_hora:new Date().toLocaleString("pt-BR")});await registrarHistorico(equipamentoAtual.id,ch.id,"E-mail enviado","Notificação enviada para "+emailDestino,"ABERTO")}catch(e){await registrarHistorico(equipamentoAtual.id,ch.id,"Falha no envio de e-mail","Erro ao tentar enviar notificação por e-mail.","ABERTO")}}
async function abrirChamado(){const tipo=document.getElementById("tipoProblema").value,prior=document.getElementById("prioridade").value,desc=document.getElementById("descricao").value.trim();if(!desc){document.getElementById("mensagem").innerText="Descreva o problema antes de enviar.";document.getElementById("mensagem").className="msg erro";return}const {data:exist}=await supabaseClient.from("chamados").select("*").eq("equipamento_id",equipamentoAtual.id).in("status",["ABERTO","EM MANUTENCAO","MANUTENCAO"]);if(exist&&exist.length){document.getElementById("mensagem").innerText="Já existe um chamado em andamento para este equipamento.";document.getElementById("mensagem").className="msg erro";return}const {data,error}=await supabaseClient.from("chamados").insert([{equipamento_id:equipamentoAtual.id,tipo_problema:tipo,prioridade:prior,descricao:desc,status:"ABERTO",aberto_por:usuarioLogadoChamado||"Não informado"}]).select().single();if(error){document.getElementById("mensagem").innerText=error.message;document.getElementById("mensagem").className="msg erro";return}await supabaseClient.from("equipamentos").update({status:"MANUTENCAO"}).eq("id",equipamentoAtual.id);await registrarHistorico(equipamentoAtual.id,data.id,"Chamado aberto","Tipo: "+tipo+". Prioridade: "+prior+". Descrição: "+desc,"ABERTO");await enviarEmailNotificacao(data,tipo,prior,desc);document.getElementById("mensagem").innerText="Chamado aberto com sucesso. A academia foi notificada por e-mail.";document.getElementById("mensagem").className="msg sucesso";document.getElementById("btnAbrirChamado").disabled=true;document.getElementById("btnAbrirChamado").style.opacity=".5";document.getElementById("avisoChamado").classList.remove("oculto")}
</script></body></html>
