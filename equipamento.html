<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitar Manutenção | GymCare QR</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#f3f4f6;
padding:20px;
color:#111827
}

.card{
max-width:700px;
margin:auto;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08)
}

h1{
color:#93D500;
margin-bottom:10px
}

.subtitulo{
color:#6b7280;
margin-bottom:25px
}

.info{
background:#f9fafb;
padding:18px;
border-radius:14px;
margin-bottom:20px
}

.info p{
margin:6px 0
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px
}

textarea{
resize:none;
min-height:120px
}

button{
width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:14px;
background:#93D500;
font-size:16px;
font-weight:bold;
cursor:pointer
}

button:hover{
opacity:.95
}

.msg{
margin-top:20px;
text-align:center;
font-weight:bold
}

.sucesso{
color:#15803d
}

.erro{
color:#dc2626
}

.alerta{
background:#fef3c7;
color:#92400e;
padding:14px;
border-radius:12px;
margin-bottom:20px
}

.oculto{
display:none
}
</style>
</head>

<body>

<div class="card">

<div id="loginArea">

<h1>GymCare QR</h1>

<p class="subtitulo">
Login do equipamento
</p>

<label>Usuário</label>
<input type="text" id="usuario">

<label>Senha</label>
<input type="password" id="senha">

<button onclick="fazerLogin()">
Entrar
</button>

<p id="erroLogin" class="msg erro"></p>

</div>

<div id="painelEquipamento" class="oculto">

<h1 id="nomeEquipamento">
Carregando...
</h1>

<p class="subtitulo">
Solicitação de manutenção
</p>

<div class="info">
<p><strong>Marca:</strong> <span id="marca"></span></p>
<p><strong>Modelo:</strong> <span id="modelo"></span></p>
<p><strong>Local:</strong> <span id="localizacao"></span></p>
<p><strong>Status:</strong> <span id="status"></span></p>
</div>

<div id="avisoChamado"
class="alerta oculto">

Já existe uma solicitação em andamento para este equipamento.
</div>

<label>Tipo do problema</label>

<select id="tipoProblema">
<option>Quebrado</option>
<option>Barulho estranho</option>
<option>Falha elétrica</option>
<option>Revisão preventiva</option>
<option>Outro</option>
</select>

<label>Prioridade</label>

<select id="prioridade">
<option value="BAIXA">Baixa</option>
<option value="MEDIA">Média</option>
<option value="ALTA">Alta</option>
<option value="URGENTE">Urgente</option>
</select>

<label>Descrição</label>

<textarea id="descricao"></textarea>

<button id="btnAbrirChamado"
onclick="abrirChamado()">

Solicitar manutenção

</button>

<p id="mensagem" class="msg"></p>

</div>

</div>

<script>
const SUPABASE_URL =
"https://juwbkfhfmygduktuzqmu.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Ziop6jmXiNjC12Dr2JL2Yg_kMskWuEA";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let equipamentoAtual = null;

function obterIdEquipamento(){
const params =
new URLSearchParams(window.location.search);

return params.get("id");
}

function fazerLogin(){

const usuario =
document.getElementById("usuario")
.value.trim();

const senha =
document.getElementById("senha")
.value.trim();

if(
usuario === "equipamento01" &&
senha === "teste01"
){

document.getElementById("loginArea")
.classList.add("oculto");

document.getElementById("painelEquipamento")
.classList.remove("oculto");

carregarEquipamento();

}else{

document.getElementById("erroLogin")
.innerText =
"Usuário ou senha inválidos.";

}
}

async function carregarEquipamento(){

const id =
obterIdEquipamento();

const { data, error } =
await supabaseClient
.from("equipamentos")
.select("*")
.eq("id", id)
.single();

if(error || !data){

document.getElementById("mensagem")
.innerHTML =
"Equipamento não encontrado.";

return;
}

equipamentoAtual = data;

document.getElementById("nomeEquipamento")
.innerText = data.nome;

document.getElementById("marca")
.innerText = data.marca || "-";

document.getElementById("modelo")
.innerText = data.modelo || "-";

document.getElementById("localizacao")
.innerText = data.localizacao || "-";

document.getElementById("status")
.innerText =
data.status || "OPERACIONAL";

verificarChamadoAberto();
}

async function verificarChamadoAberto(){

const { data } =
await supabaseClient
.from("chamados")
.select("*")
.eq("equipamento_id",
equipamentoAtual.id)
.in("status",
["ABERTO","EM MANUTENCAO"]);

if(data && data.length > 0){

document.getElementById(
"avisoChamado"
).classList.remove("oculto");

document.getElementById(
"btnAbrirChamado"
).disabled = true;

document.getElementById(
"btnAbrirChamado"
).style.opacity = ".5";
}
}

async function abrirChamado(){

const tipoProblema =
document.getElementById(
"tipoProblema"
).value;

const prioridade =
document.getElementById(
"prioridade"
).value;

const descricao =
document.getElementById(
"descricao"
).value.trim();

const { data: existente } =
await supabaseClient
.from("chamados")
.select("*")
.eq("equipamento_id",
equipamentoAtual.id)
.in("status",
["ABERTO",
"EM MANUTENCAO"]);

if(existente &&
existente.length > 0){

document.getElementById(
"mensagem"
).innerHTML =
"Já existe um chamado em andamento.";

document.getElementById(
"mensagem"
).className =
"msg erro";

return;
}

const { error } =
await supabaseClient
.from("chamados")
.insert([{
equipamento_id:
equipamentoAtual.id,

tipo_problema:
tipoProblema,

prioridade:
prioridade,

descricao:
descricao,

status:
"ABERTO"
}]);

if(error){

document.getElementById(
"mensagem"
).innerHTML =
error.message;

document.getElementById(
"mensagem"
).className =
"msg erro";

return;
}

await supabaseClient
.from("equipamentos")
.update({
status:"MANUTENCAO"
})
.eq("id",
equipamentoAtual.id);

document.getElementById(
"mensagem"
).innerHTML =
"Chamado aberto com sucesso.";

document.getElementById(
"mensagem"
).className =
"msg sucesso";

document.getElementById(
"btnAbrirChamado"
).disabled = true;

document.getElementById(
"btnAbrirChamado"
).style.opacity = ".5";

document.getElementById(
"avisoChamado"
).classList.remove("oculto");

}
</script>

</body>
</html>
